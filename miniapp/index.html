<!doctype html>
<html lang="ru" data-theme="default">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Prime Mafia</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="/miniapp/styles.css" />
</head>
<body class="device-unknown">
  <main class="shell">
    <section class="hero">
      <div class="brand">
        <div class="mark">PM</div>
        <div>
          <p class="eyebrow" id="brandEyebrow">Prime Mafia</p>
          <h1 id="heroTitle">Панель ведущего</h1>
          <p class="device-hint" id="deviceHint"></p>
        </div>
      </div>
      <div class="hero-actions">
        <button class="button primary" data-action="igrovoy_vecher">Игровой вечер</button>
        <button class="button" data-action="create_game">Создать игру</button>
        <button class="button button-expand hidden" type="button" id="expandBtn">⛶ На весь экран</button>
      </div>
    </section>

    <section class="layout">
      <aside class="panel sidebar">
        <div class="section-title">
          <span>Профиль</span>
          <span class="status-dot"></span>
        </div>
        <div class="profile">
          <div class="avatar" id="avatar">PM</div>
          <div>
            <h2 id="profileName">Загрузка...</h2>
            <p id="profileMeta">Проверяем Telegram</p>
          </div>
        </div>

        <div>
          <div class="section-title">Тема интерфейса</div>
          <div class="theme-grid" id="themeGrid"></div>
        </div>

        <div class="quick-grid">
          <button class="tile" data-action="my_games">
            <span>🎮</span>
            <strong>Мои игры</strong>
          </button>
          <button class="tile" data-action="rating">
            <span>🏆</span>
            <strong>Рейтинг</strong>
          </button>
          <button class="tile" data-action="open_menu">
            <span>🏠</span>
            <strong>Меню бота</strong>
          </button>
          <button class="tile" data-action="roles">
            <span>🎭</span>
            <strong>Роли</strong>
          </button>
        </div>

        <div>
          <div class="section-title">Клубы</div>
          <div class="list" id="clubsList"></div>
        </div>
      </aside>

      <section class="panel table-panel">
        <div class="table-head">
          <div>
            <p class="eyebrow">Активная игра</p>
            <h2 id="gameTitle">Стол пока пуст</h2>
          </div>
          <span class="badge" id="gameStatus">ожидание</span>
        </div>

        <div class="mafia-table" id="table">
          <div class="table-center">
            <span id="tableBrandTop">Prime</span>
            <strong id="tableBrandMain">Mafia</strong>
          </div>
        </div>
      </section>

      <aside class="panel inspector">
        <div class="inspector-stats">
          <div class="section-title">Состояние вечера</div>
          <div class="stats">
            <div>
              <span id="gamesCount">0</span>
              <p>активных игр</p>
            </div>
            <div>
              <span id="playersCount">0</span>
              <p>игроков за столом</p>
            </div>
            <div>
              <span id="aliveCount">0</span>
              <p>в игре</p>
            </div>
          </div>
        </div>

        <div class="inspector-rating">
          <div class="section-title">Мой рейтинг</div>
          <div class="rating-card" id="myRating"></div>
        </div>

        <div class="inspector-best">
          <div class="section-title">Лучшая игра</div>
          <div class="best-game-card" id="bestGame"></div>
        </div>

        <div class="inspector-top">
          <div class="section-title">Топ клуба</div>
          <div class="list ranking" id="clubTop"></div>
        </div>

        <div class="inspector-games">
          <div class="section-title">Игры</div>
          <div class="list games" id="gamesList"></div>
        </div>
      </aside>
    </section>
  </main>

  <div class="toast" id="toast"></div>
  <script src="/miniapp/app.js"></script>
</body>
</html>
